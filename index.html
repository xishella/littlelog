<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>LittleLog</title>
    <meta
      name="description"
      content="LittleLog helps caregivers log a baby’s day and create a warm, parent-ready handoff summary."
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#FAF8F5" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:title" content="LittleLog" />
    <meta
      property="og:description"
      content="A warm, simple baby care handoff app for tracking little moments and sharing caregiver updates."
    />
    <meta property="og:image" content="/meta-image.png" />
    <meta property="og:type" content="website" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LittleLog" />
    <meta
      name="twitter:description"
      content="A warm, simple baby care handoff app for tracking little moments and sharing caregiver updates."
    />
    <meta name="twitter:image" content="/meta-image.png" />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      #root {
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
